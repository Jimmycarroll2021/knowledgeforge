# KnowledgeForge configuration
# Copy to config.yaml and fill in your values.

# Graph store
store:
  backend: sqlite           # sqlite | (future: postgres, neo4j)
  path: data/graph.db

# Vector store (Phase 4)
vectors:
  backend: chromadb
  path: data/chroma

# LLM inference (Phase 5 — GraphRAG)
llm:
  provider: anthropic
  model: claude-sonnet-4-6
  # Set ANTHROPIC_API_KEY in .env

# Adapters
adapters:
  vault:
    include_dirs:           # leave empty to ingest all non-excluded dirs
      # - algorithms
      # - concepts
    max_facts_per_file: 40
    max_file_bytes: 1048576

# API (Phase 6)
api:
  host: 0.0.0.0
  port: 8000
