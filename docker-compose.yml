services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - kg_data:/app/data
    environment:
      - KF_DB_PATH=/app/data/graph.db
      - KF_EMBEDDINGS_PATH=/app/data/embeddings
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  kg_data:
